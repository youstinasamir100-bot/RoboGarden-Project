<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta http-equiv="X-UA-Compatible" content="IE=edge">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Contact Us</title>

 <!-- Bootstrap -->
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
   Integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

 <!-- CSS -->
 <link rel="stylesheet" href="style.css">

 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
   integrity="sha512-SfTiTlX6kk+qitfevl/7LibUOeJWlt9rbyDn92a1DqWOw9vWG2MFoays0sgObmWazO5BQPiFucnnEAjpAB+/Sw=="
   crossorigin="anonymous" referrerpolicy="no-referrer" />

 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
   integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous">
 </script>
 <script src="https://code.jquery.com/jquery-3.6.0.min.js"
   integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous">
 </script>

 

</head>

<body>

  <!--NavBar-->
 <nav class="navbar navbar-expand-lg navbar-dark bg-success">
   <div class="container">
     <a class="navbar-brand text-light" href="#">RoboEat</a>
     <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
       aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
       <span class="navbar-toggler-icon"></span>
     </button>
     <div class="collapse navbar-collapse" id="navbarSupportedContent">
       <ul class="navbar-nav mx-auto gap-5 mb-2 mb-lg-0 nav nav-tabs">
         <li class="nav-item1">
           <a class="nav-link " href="index.html">Home</a>
         </li>
         <li class="nav-item2">
           <a class="nav-link " href="about.html">About Us</a>
         </li>
         <li class="nav-item3">
           <a class="nav-link active" aria-current="page" href="contact.html"  style="color: green;">Contact Us</a>
         </li>
       </ul>
       <div class="d-flex text-light btn btn-link">
         <span><i class="fa fa-phone" aria-hidden="true"></i></span><span class="px-2">Call to place order</span>
       </div>
     </div>
   </div>
 </nav>

 <br>

 <!--form-->
 <div class="container form">
   <section>
     <h1>Contact Us</h1>

     <div class="alert alert-success mt-4" id="success_message" style="display:none;" role="alert">
            Contact message was successfully sent!
        </div>
     <form class="mb-3" id="submit_form">
       <!--Name-->
       <div class="mb-3">
         <label class="form-label">Name</label>
         <input type="text" name="name" class="form-control">
       </div>
       <!--email-->
       <div class="mb-3">
         <label class="form-label">Email</label>
         <input type="email" name="email" class="form-control">
       </div>
       <!--phone-->
       <div class="mb-3">
         <label class="form-label">Phone</label>
         <input type="phone" name="phone" class="form-control">
       </div>
       <!--message-->
       <div class="mb-3">
         <label class="form-label">Message</label>
         <textarea class="form-control" name="message" rows="5"></textarea>
       </div>
       <!--submit button-->
       <button type="submit" class="btn custom-btn w-100">Submit</button>
     </form>
   </section>
 </div>
 
 <br>

 <!--footer-->
 <section>
   <footer class="bg-success text-center py-3">
     <span class="text-light">© 2021 Robogarden Inc.</span>
   </footer>
 </section>


 <!--validating that a user entered information for all the form fields-->
 <script>
    $('#submit_form').submit(function(e){
        e.preventDefault();

        if(!$('input[name=name]').val()){
            alert('Name field is required.');
            return;
        }

        if(!$('input[name=email]').val()){
            alert('Email field is required.');
            return;
        }

        if(!$('input[name=phone]').val()){
            alert('Phone field is required.');
            return;
        }

        if(!$('textarea[name=message]').val()){
            alert('Message field is required.');
            return;
        }

        $('#success_message').show();
    });
</script>
 
</body>

</html>
